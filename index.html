<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — DICT Data Science Seminar</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--line:#334155;--accent:#38bdf8;--accent2:#a78bfa;--good:#34d399;--text:#e2e8f0;--muted:#94a3b8;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:5vh 5vw}
  .wrap{width:100%;max-width:460px}
  .badge{display:inline-block;background:rgba(52,211,153,.15);color:var(--good);border:1px solid var(--good);border-radius:999px;padding:.2rem .8rem;font-size:.78rem;font-weight:700;margin-bottom:1rem}
  .kicker{color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.75rem;margin-bottom:.5rem}
  h1{font-size:clamp(1.6rem,4vw,2.3rem);line-height:1.15;margin-bottom:.5rem}
  .accent{color:var(--accent)}
  p.sub{color:var(--muted);font-size:1rem;margin-bottom:1.6rem;line-height:1.5}
  form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.6rem}
  label{display:block;font-size:.85rem;font-weight:600;color:var(--text);margin:.9rem 0 .35rem}
  label:first-child{margin-top:0}
  input{width:100%;background:#0f172a;border:1px solid var(--line);border-radius:9px;padding:.7rem .9rem;
    color:var(--text);font-size:1rem;outline:none;transition:.15s}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:1.4rem;background:var(--accent);color:#06283d;border:none;border-radius:9px;
    padding:.85rem;font-size:1.05rem;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.6;cursor:not-allowed}
  .status{margin-top:1rem;font-size:.9rem;color:var(--muted);text-align:center;min-height:1.2em}
  .privacy{margin-top:1.2rem;font-size:.78rem;color:var(--muted);line-height:1.5;text-align:center}
  .err{color:#fca5a5}
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">DICT · Attendance</div>
    <div class="kicker">Data Science Seminar · CAR Region</div>
    <h1>Please <span class="accent">sign in</span> to continue</h1>
    <p class="sub">Register your attendance to access the seminar materials.</p>

    <form id="regForm" autocomplete="on">
      <label for="fullName">Full name *</label>
      <input id="fullName" name="fullName" type="text" required placeholder="Juan Dela Cruz">

      <label for="email">Email address *</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com">

      <label for="contact">Contact number *</label>
      <input id="contact" name="contact" type="tel" required placeholder="09xx xxx xxxx">

      <button id="submitBtn" type="submit">Sign in &amp; enter →</button>
      <div class="status" id="status"></div>
    </form>

    <p class="privacy">We record your name, email, contact, sign-in time, and approximate location (from your IP)
      for seminar attendance only.</p>
  </div>

<script>
  // Attendance is stored in Railway Postgres via this site's own /api/attendance endpoint.

  // Already signed in on this device? Go straight in.
  if (localStorage.getItem('dict_attendance')) {
    location.replace('home.html');
  }

  async function getGeo() {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 4000);
      const r = await fetch('https://ipapi.co/json/', { signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) throw new Error('geo');
      const g = await r.json();
      return { ip: g.ip || '', city: g.city || '', region: g.region || '', country: g.country_name || '' };
    } catch (e) {
      return { ip: '', city: '', region: '', country: '' };
    }
  }

  document.getElementById('regForm').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    btn.disabled = true; status.className = 'status'; status.textContent = 'Signing you in…';

    const now = new Date();
    const geo = await getGeo();
    const payload = {
      fullName: document.getElementById('fullName').value.trim(),
      email: document.getElementById('email').value.trim(),
      contact: document.getElementById('contact').value.trim(),
      date: now.toISOString().split('T')[0],
      time: now.toLocaleTimeString(),
      timestamp: now.toISOString(),
      ip: geo.ip, city: geo.city, region: geo.region, country: geo.country,
      userAgent: navigator.userAgent
    };

    // Record the sign-in in Railway Postgres (same-origin API)
    try {
      await fetch('/api/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) { /* keep going even if logging fails */ }

    localStorage.setItem('dict_attendance', '1');
    localStorage.setItem('dict_attendee', JSON.stringify({ fullName: payload.fullName, email: payload.email }));
    status.textContent = 'Welcome! Opening the seminar…';
    location.href = 'home.html';
  });
</script>
</body>
</html>
