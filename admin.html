<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Admin — eMathrix Education</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--line:#334155;--accent:#38bdf8;--good:#34d399;--text:#e2e8f0;--muted:#94a3b8;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:4vh 4vw}
  h1{font-size:1.6rem;margin-bottom:.3rem}
  .accent{color:var(--accent)}
  .muted{color:var(--muted);font-size:.92rem}
  .bar{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin:1.2rem 0}
  input{background:#0f172a;border:1px solid var(--line);border-radius:9px;padding:.6rem .8rem;color:var(--text);font-size:.95rem;min-width:280px;outline:none}
  input:focus{border-color:var(--accent)}
  button,a.btn{background:var(--accent);color:#06283d;border:none;border-radius:9px;padding:.6rem 1.1rem;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
  a.btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
  button:hover,a.btn:hover{filter:brightness(1.08)}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:.7rem 1.1rem;font-weight:700}
  .stat b{color:var(--good);font-size:1.3rem}
  table{width:100%;border-collapse:collapse;margin-top:1rem;font-size:.88rem}
  th,td{border:1px solid var(--line);padding:.5rem .6rem;text-align:left;vertical-align:top}
  th{background:#0b3a52;color:#fff;position:sticky;top:0}
  tr:nth-child(even){background:rgba(255,255,255,.02)}
  .wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .status{margin-top:.8rem;font-size:.9rem;color:var(--muted)}
  .err{color:#fca5a5}
  .pill{font-size:.72rem;font-weight:700;border-radius:999px;padding:.1rem .55rem;background:rgba(52,211,153,.15);color:var(--good);border:1px solid var(--good)}
</style>
<link rel="stylesheet" href="assets/pup-theme.css">
</head>
<body>
  <h1>Attendance <span class="accent">Admin</span></h1>
  <div class="muted">Sign-ins recorded at the class website. Enter your admin token to load the records.</div>

  <div class="bar">
    <input id="token" type="password" placeholder="Admin token" autocomplete="off">
    <button id="loadBtn">Load records</button>
    <a class="btn ghost" id="csvBtn" href="#" target="_blank">⬇ Download CSV</a>
    <div class="stat">Total sign-ins: <b id="count">—</b></div>
  </div>

  <div class="status" id="status"></div>
  <div class="wrap"><table id="tbl"><thead><tr>
    <th>#</th><th>Recorded (server)</th><th>Full name</th><th>Email</th><th>Contact</th>
    <th>Date</th><th>Time</th><th>IP</th><th>City</th><th>Region</th><th>Country</th>
  </tr></thead><tbody id="rows"></tbody></table></div>

<script>
  const $ = (id) => document.getElementById(id);
  // allow ?token=... in the URL, else use the input
  const urlToken = new URLSearchParams(location.search).get('token');
  if (urlToken) $('token').value = urlToken;

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  async function load(){
    const token = $('token').value.trim();
    const status = $('status');
    if(!token){ status.className='status err'; status.textContent='Enter your admin token first.'; return; }
    status.className='status'; status.textContent='Loading…';
    $('csvBtn').href = '/admin/attendance.csv?token=' + encodeURIComponent(token);
    try{
      const r = await fetch('/admin/attendance.json?token=' + encodeURIComponent(token));
      if(r.status===403){ status.className='status err'; status.textContent='Wrong token (forbidden).'; return; }
      if(!r.ok){ status.className='status err'; status.textContent='Error: '+r.status; return; }
      const data = await r.json();
      $('count').textContent = data.count;
      const tb = $('rows'); tb.innerHTML='';
      data.rows.forEach((x,i)=>{
        const tr=document.createElement('tr');
        tr.innerHTML = `<td>${data.count-i}</td><td>${esc(x.created_at)}</td><td>${esc(x.full_name)}</td>`+
          `<td>${esc(x.email)}</td><td>${esc(x.contact)}</td><td>${esc(x.sign_date)}</td>`+
          `<td>${esc(x.sign_time)}</td><td>${esc(x.ip)}</td><td>${esc(x.city)}</td>`+
          `<td>${esc(x.region)}</td><td>${esc(x.country)}</td>`;
        tb.appendChild(tr);
      });
      status.className='status'; status.textContent = 'Loaded '+data.count+' record(s) · '+new Date().toLocaleString();
      sessionStorage.setItem('pup_admin_token', token);
    }catch(e){ status.className='status err'; status.textContent='Network error: '+e.message; }
  }

  $('loadBtn').addEventListener('click', load);
  $('token').addEventListener('keydown', e=>{ if(e.key==='Enter') load(); });
  const saved = sessionStorage.getItem('pup_admin_token') || sessionStorage.getItem('dict_admin_token');
  if(saved){ $('token').value = saved; }
  if($('token').value){ load(); }
</script>
</body>
</html>
