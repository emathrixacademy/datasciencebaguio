<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — eMathrix Education</title>
<style>
  :root{--maroon:#6A0F1A;--maroon-dark:#4A0A12;--yellow:#F5C518;--line:#E7D7DA;--gray:#F2F2F2;--text:#241017;--muted:#6B5B60;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:#fff;color:var(--text);min-height:100vh;padding:3vh 3vw}
  h1{font-size:1.5rem;color:var(--maroon)}
  .muted{color:var(--muted);font-size:.9rem}
  .login{max-width:380px;margin:8vh auto 0;background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.6rem;box-shadow:0 10px 30px rgba(106,15,26,.08)}
  .badge{display:inline-block;background:var(--yellow);color:var(--maroon-dark);border:1px solid var(--maroon);border-radius:999px;padding:.15rem .7rem;font-size:.75rem;font-weight:800;margin-bottom:.8rem}
  label{display:block;font-size:.82rem;font-weight:600;margin:.6rem 0 .25rem}
  input,select{width:100%;background:#fff;border:1px solid var(--line);border-radius:9px;padding:.55rem .75rem;font-size:.92rem;outline:none}
  input:focus,select:focus{border-color:var(--maroon);box-shadow:0 0 0 3px rgba(245,197,24,.35)}
  button{background:var(--maroon);color:#fff;border:none;border-radius:9px;padding:.5rem 1rem;font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:inset 0 -3px 0 var(--yellow)}
  button:hover{background:var(--maroon-dark)}
  button.ghost{background:#fff;color:var(--maroon);border:1px solid var(--maroon);box-shadow:none}
  button.danger{background:#b91c1c;box-shadow:inset 0 -3px 0 #f59e0b}
  button.sm{padding:.25rem .55rem;font-size:.78rem}
  .full{width:100%;margin-top:1rem}
  .err{color:#b91c1c;font-size:.88rem;margin-top:.6rem;min-height:1.1em}
  #dash{display:none}
  .top{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin:.6rem 0}
  .stat{background:var(--gray);border:1px solid var(--line);border-radius:12px;padding:.4rem .9rem;font-weight:700;font-size:.9rem}
  .stat b{color:var(--maroon)}
  .tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin:.8rem 0 .3rem}
  .tab{background:var(--gray);border:1px solid var(--line);border-radius:999px;padding:.4rem 1rem;font-weight:700;cursor:pointer}
  .tab.on{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .filters{display:flex;flex-wrap:wrap;gap:.5rem;align-items:end;background:var(--gray);border:1px solid var(--line);border-radius:12px;padding:.7rem;margin:.4rem 0}
  .filters .f{display:flex;flex-direction:column;min-width:150px}
  .filters .f.grow{flex:1;min-width:220px}
  .filters label{margin:0 0 .2rem}
  .actions{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin:.5rem 0}
  .count{font-weight:700;color:var(--maroon)}
  table{width:100%;border-collapse:collapse;margin-top:.4rem;font-size:.83rem}
  th,td{border:1px solid var(--line);padding:.4rem .55rem;text-align:left;vertical-align:top}
  th{background:var(--maroon);color:#fff;position:sticky;top:0}
  tr:nth-child(even){background:var(--gray)}
  .wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:64vh}
  a.link{color:var(--maroon);font-weight:600;word-break:break-all}
  .status{color:var(--muted);font-size:.85rem;margin:.4rem 0}
  .view{display:none}.view.on{display:block}
</style>
<link rel="stylesheet" href="assets/pup-theme.css">
</head>
<body>

  <!-- LOGIN — no data present/fetched until the server verifies credentials -->
  <div class="login" id="login">
    <div class="badge">eMathrix Education · Admin</div>
    <h1>Admin sign in</h1>
    <div class="muted">Instructor access only. Records load only after the server verifies your credentials.</div>
    <label for="email">Admin email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com">
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="full" id="loginBtn">Sign in</button>
    <div class="err" id="err"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="top">
      <h1>Admin</h1><span class="muted">· eMathrix Education</span>
      <span class="stat">Showing <b id="showX">0</b> of <b id="showY">0</b></span>
      <button class="ghost sm" id="refresh">↻ Refresh</button>
      <button class="ghost sm" id="purge">Purge test rows</button>
      <button class="ghost sm" id="logout">Sign out</button>
    </div>

    <div class="tabs">
      <div class="tab on" data-v="att">Attendance</div>
      <div class="tab" data-v="study">Study time</div>
      <div class="tab" data-v="sub">Activity submissions (links)</div>
    </div>

    <div class="filters">
      <div class="f grow"><label>Search (name / email / student no.)</label><input id="fq" placeholder="type to search…"></div>
      <div class="f"><label>Section</label><select id="fsec">
        <option value="">All sections</option>
        <option value="IT Electives 3 (Mon 5-8PM / Thu)">IT Electives 3</option>
        <option value="BSIT 3-2 (Mon 2-5PM / Fri)">BSIT 3-2</option>
        <option value="Other / not sure">Other / not sure</option>
      </select></div>
      <div class="f" id="wkWrap"><label>Week</label><select id="fwk">
        <option value="">All weeks</option><option>Week 1</option><option>Week 2</option><option>Week 3</option>
      </select></div>
      <div class="f" id="actWrap"><label>Activity</label><select id="fact">
        <option value="">All activities</option>
        <option value="w1a1">w1a1</option><option value="w1a2">w1a2</option><option value="w1a3">w1a3</option>
        <option value="w2a1">w2a1</option><option value="w2a2">w2a2</option><option value="w3cap">w3cap</option>
      </select></div>
      <div class="f"><label>&nbsp;</label><button class="ghost" id="clear">Clear</button></div>
    </div>

    <div class="actions">
      <button class="sm" id="csvBtn">⬇ Download CSV</button>
      <button class="sm" id="pdfBtn">🖨 Download PDF</button>
      <button class="sm danger" id="bulkDel">🗑 Delete filtered</button>
      <span class="status" id="status"></span>
    </div>

    <div class="wrap"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const state = { tab:'att' };
  const TAB = {
    att:  { key:'attendance', label:'Attendance', del:'id',
      cols:[{k:'created_at',t:'Recorded'},{k:'full_name',t:'Name'},{k:'email',t:'Email'},{k:'contact',t:'Contact'},
            {k:'section',t:'Section'},{k:'student_no',t:'Student No.'},{k:'sign_date',t:'Date'},{k:'sign_time',t:'Time'},
            {k:'ip',t:'IP'},{k:'city',t:'City'},{k:'region',t:'Region'},{k:'country',t:'Country'}] },
    study:{ key:'study', label:'Study time', del:'email',
      cols:[{k:'student_email',t:'Email'},{k:'student_name',t:'Name'},{k:'section',t:'Section'},{k:'student_no',t:'Student No.'},
            {k:'total_minutes',t:'Total min'},{k:'session_count',t:'Sessions'},{k:'active_days',t:'Active days'},
            {k:'first_seen',t:'First seen'},{k:'last_seen',t:'Last seen'}] },
    sub:  { key:'submissions', label:'Activity submissions', del:'id',
      cols:[{k:'student_email',t:'Email'},{k:'student_name',t:'Name'},{k:'section',t:'Section'},{k:'student_no',t:'Student No.'},
            {k:'activity_key',t:'Activity'},{k:'submitted_link',t:'Submitted link',link:true},{k:'submitted_at',t:'When'}] },
  };
  let currentRows = [];

  function curFilters(){
    return { q:$('fq').value.trim(), section:$('fsec').value, week:$('fwk').value, activity:$('fact').value };
  }
  function qs(f){ return Object.entries(f).filter(([,v])=>v).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&'); }

  async function login(){
    const email=$('email').value.trim(), password=$('pw').value; $('err').textContent='';
    if(!email||!password){ $('err').textContent='Enter email and password.'; return; }
    $('loginBtn').disabled=true;
    try{
      const r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      $('loginBtn').disabled=false;
      if(!r.ok){ $('err').textContent='Invalid credentials.'; return; }
      $('login').style.display='none'; $('dash').style.display='block'; load();
    }catch(e){ $('loginBtn').disabled=false; $('err').textContent='Network error.'; }
  }

  async function getJSON(url){
    const r=await fetch(url,{credentials:'same-origin'});
    if(r.status===403) throw new Error('forbidden');
    if(!r.ok) throw new Error('error '+r.status);
    return r.json();
  }

  function renderTable(){
    const cfg=TAB[state.tab];
    $('thead').innerHTML='<tr>'+cfg.cols.map(c=>`<th>${c.t}</th>`).join('')+'<th>Delete</th></tr>';
    $('tbody').innerHTML=currentRows.map(row=>{
      const tds=cfg.cols.map(c=>{
        let v=row[c.k];
        if(c.link && /^https?:\/\//i.test(String(v||''))) v=`<a class="link" href="${esc(v)}" target="_blank" rel="noopener">${esc(v)}</a>`;
        else v=esc(v);
        return `<td>${v}</td>`;
      }).join('');
      const idv = cfg.del==='id' ? row.id : row.student_email;
      return `<tr>${tds}<td><button class="sm danger" data-del="${esc(idv)}">Delete</button></td></tr>`;
    }).join('');
    $('tbody').querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delSingle(b.getAttribute('data-del'))));
  }

  async function load(){
    const cfg=TAB[state.tab];
    // week/activity filters only relevant to submissions
    $('wkWrap').style.display = state.tab==='sub'?'flex':'none';
    $('actWrap').style.display = state.tab==='sub'?'flex':'none';
    $('status').textContent='Loading…';
    try{
      const data=await getJSON('/admin/'+cfg.key+'.json?'+qs(curFilters()));
      currentRows=data.rows||[];
      $('showX').textContent=data.count!=null?data.count:currentRows.length;
      $('showY').textContent=data.total!=null?data.total:currentRows.length;
      renderTable();
      $('status').textContent='Loaded · '+new Date().toLocaleString();
    }catch(e){
      if(e.message==='forbidden'){ $('dash').style.display='none'; $('login').style.display='block'; $('err').textContent='Session expired — sign in again.'; }
      else $('status').textContent='Error: '+e.message;
    }
  }

  async function delSingle(idOrEmail){
    const cfg=TAB[state.tab];
    if(!confirm('Delete this record permanently? This cannot be undone.')) return;
    const body={ tab:cfg.key, mode:'single' };
    if(cfg.del==='id') body.id=Number(idOrEmail); else body.email=idOrEmail;
    const r=await fetch('/admin/delete',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)});
    if(r.status===403){ alert('Not authorized.'); return; }
    const j=await r.json(); if(!j.ok){ alert('Delete failed: '+(j.error||'')); return; }
    load();
  }

  async function delBulk(){
    const cfg=TAB[state.tab]; const f=curFilters();
    const hasFilter = f.q||f.section||f.week||f.activity;
    const x=$('showX').textContent;
    let need, msg;
    if(hasFilter){ need='DELETE'; msg=`This will permanently delete ${x} ${cfg.label} record(s) matching the current filters.\n\nType DELETE to confirm:`; }
    else { need='DELETE ALL'; msg=`⚠ No filter set. This will permanently delete the ENTIRE ${cfg.label} table (${x} records).\n\nType DELETE ALL to confirm:`; }
    const typed=prompt(msg);
    if(typed!==need){ if(typed!==null) alert('Cancelled — text did not match.'); return; }
    const r=await fetch('/admin/delete',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify(Object.assign({tab:cfg.key,mode:'bulk',confirm:typed}, f))});
    if(r.status===403){ alert('Not authorized.'); return; }
    const j=await r.json(); if(!j.ok){ alert('Delete failed: '+(j.error||'')); return; }
    alert('Deleted '+j.deleted+' record(s).'); load();
  }

  function downloadCsv(){ window.open('/admin/'+TAB[state.tab].key+'.csv?'+qs(curFilters()),'_blank'); }

  function downloadPdf(){
    const cfg=TAB[state.tab], f=curFilters();
    const activeFilters=[ f.q?('Search: '+f.q):'', f.section?('Section: '+f.section):'', f.week?f.week:'', f.activity?('Activity: '+f.activity):'' ].filter(Boolean).join(' · ')||'None';
    const head='<tr>'+cfg.cols.map(c=>`<th>${c.t}</th>`).join('')+'</tr>';
    const body=currentRows.map(r=>'<tr>'+cfg.cols.map(c=>{
      let v=r[c.k]; if(c.link && /^https?:\/\//i.test(String(v||''))) return `<td style="word-break:break-all">${esc(v)}</td>`; return `<td>${esc(v)}</td>`;
    }).join('')+'</tr>').join('');
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${cfg.label} — eMathrix Education</title>
      <style>body{font-family:"Segoe UI",system-ui,sans-serif;color:#241017;padding:24px}
      h1{color:#6A0F1A;margin:0 0 .2rem} .meta{color:#6B5B60;font-size:.85rem;margin-bottom:.6rem}
      table{width:100%;border-collapse:collapse;font-size:11px} th,td{border:1px solid #E7D7DA;padding:4px 6px;text-align:left}
      th{background:#6A0F1A;color:#fff} tr:nth-child(even){background:#F7ECEE}
      .foot{margin-top:14px;border-top:2px solid #6A0F1A;padding-top:6px;color:#6B5B60;font-size:.8rem}</style></head>
      <body><h1>eMathrix Education · ${cfg.label}</h1>
      <div class="meta">Filters: ${esc(activeFilters)} &nbsp;·&nbsp; Showing ${currentRows.length} record(s) &nbsp;·&nbsp; Generated ${new Date().toLocaleString()}</div>
      <table><thead>${head}</thead><tbody>${body}</tbody></table>
      <div class="foot">© eMathrix Education · Data Science &amp; Data Analytics — for PUP Santa Rosa students. Confidential — class records.</div>
      <script>window.onload=function(){window.print();}<\/script></body></html>`);
    w.document.close();
  }

  async function purge(){
    if(!confirm('Delete all @example.com test rows from attendance, study, and submissions?')) return;
    const r=await fetch('/admin/purge-test',{method:'POST',credentials:'same-origin'});
    if(r.status===403){ alert('Not authorized.'); return; }
    const j=await r.json(); alert('Purged: '+JSON.stringify(j.deleted||j)); load();
  }

  // wire up
  $('loginBtn').addEventListener('click',login);
  $('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  $('email').addEventListener('keydown',e=>{if(e.key==='Enter')$('pw').focus();});
  $('refresh').addEventListener('click',load);
  $('csvBtn').addEventListener('click',downloadCsv);
  $('pdfBtn').addEventListener('click',downloadPdf);
  $('bulkDel').addEventListener('click',delBulk);
  $('purge').addEventListener('click',purge);
  $('clear').addEventListener('click',()=>{ $('fq').value='';$('fsec').value='';$('fwk').value='';$('fact').value=''; load(); });
  ['fq','fsec','fwk','fact'].forEach(id=>{ const el=$(id); el.addEventListener('input',debounce(load,300)); el.addEventListener('change',load); });
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    state.tab=t.dataset.v; load();
  }));
  $('logout').addEventListener('click',async()=>{ await fetch('/admin/logout',{method:'POST',credentials:'same-origin'});
    $('dash').style.display='none'; $('login').style.display='block'; $('email').value='';$('pw').value=''; $('err').textContent='Signed out.'; });

  function debounce(fn,ms){ let h; return function(){ clearTimeout(h); h=setTimeout(fn,ms); }; }

  // Resume an existing admin session silently; else the login form stays (no data shown).
  getJSON('/admin/attendance.json').then(()=>{ $('login').style.display='none'; $('dash').style.display='block'; load(); }).catch(()=>{});
</script>
</body>
</html>
